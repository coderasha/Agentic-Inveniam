apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gain-identity.fullname" . }}
  labels:
    app.kubernetes.io/name: gain-identity
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gain-identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gain-identity
    spec:
      containers:
        - name: identity-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: IDENTITY_API_PORT
              value: {{ .Values.env.IDENTITY_API_PORT | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: REDIS_URL
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KAFKA_BROKERS
            - name: KEYCLOAK_ISSUER
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KEYCLOAK_ISSUER
            - name: KEYCLOAK_JWKS_URI
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KEYCLOAK_JWKS_URI
            - name: KEYCLOAK_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KEYCLOAK_AUDIENCE
            - name: KEYCLOAK_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KEYCLOAK_BASE_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gain-identity-secrets
                  key: KEYCLOAK_CLIENT_SECRET
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
